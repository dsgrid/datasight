<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>datasight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  // Apply saved theme immediately to prevent flash (respect OS preference on first visit)
  (function() {
    var saved = localStorage.getItem('datasight-theme');
    var t = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
</head>
<body>
  <header>
    <div class="left">
      <button class="btn-icon" onclick="toggleSidebar()" title="Toggle sidebar" id="sidebar-toggle">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="2.5" width="14" height="1.5" rx="0.75" fill="currentColor"/><rect x="1" y="7.25" width="14" height="1.5" rx="0.75" fill="currentColor"/><rect x="1" y="12" width="14" height="1.5" rx="0.75" fill="currentColor"/></svg>
      </button>
      <div class="brand">data<span>sight</span></div>
    </div>
    <div class="actions">
      <button class="btn-icon" onclick="toggleTheme()" title="Toggle theme" id="theme-toggle">
        <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:none"><circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <svg id="theme-icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.36 10.06A6 6 0 015.94 2.64a6 6 0 107.42 7.42z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
      </button>
      <button class="btn-icon" onclick="toggleRightPanel()" title="Toggle SQL panel" id="sql-panel-toggle">SQL</button>
      <button class="btn-icon query-log-toggle" onclick="toggleQueryLog()" title="Toggle query logging" id="query-log-toggle">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 3h12M2 6h12M2 9h9M2 12h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button class="btn-icon" onclick="clearChat()" title="New conversation">New chat</button>
    </div>
  </header>

  <div class="main-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-content" id="tables-list">
        <div class="sidebar-header">Tables</div>
        <div id="tables-container">
          <div class="no-queries">Loading schema...</div>
        </div>
      </div>
      <div class="queries-section" id="queries-section">
        <div class="sidebar-header">
          <span>Example Queries</span>
          <span class="query-count" id="query-count"></span>
        </div>
        <div class="queries-list" id="queries-list">
          <div class="no-queries">Loading...</div>
        </div>
      </div>
    </aside>

    <!-- Chat area -->
    <div class="chat-area">
      <div id="messages">
        <div class="welcome" id="welcome">
          <h2>Welcome to datasight</h2>
          <p>Ask questions about your data in plain English. I can query the database, analyze results, and create visualizations.</p>
          <p style="font-size:0.85rem;">Browse tables in the sidebar, or try one of these:</p>
          <div class="examples">
            <button class="example-btn" onclick="sendExample(this.textContent)">What tables are available and how many rows do they have?</button>
            <button class="example-btn" onclick="sendExample(this.textContent)">Show me a summary of the data</button>
            <button class="example-btn" onclick="sendExample(this.textContent)">What are the top 10 records by the largest numeric column?</button>
          </div>
        </div>
      </div>

      <form id="chat-form" onsubmit="return handleSubmit(event)">
        <div class="input-wrap">
          <textarea id="user-input" rows="1" placeholder="Ask about your data..." autofocus></textarea>
          <button type="submit" id="send-btn" title="Send">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </form>
    </div>

    <!-- Right panel: query history -->
    <aside class="right-panel" id="right-panel">
      <div class="sidebar-header">
        <span>Query History</span>
      </div>
      <div class="query-history" id="query-history">
        <span class="no-sql">No queries yet.</span>
      </div>
    </aside>
  </div>

<script src="/static/app.js"></script>
</body>
</html>
