site_name: datasight
site_description: AI-powered data exploration with natural language
repo_url: https://github.com/dsgrid/datasight
repo_name: datasight

theme:
  name: material
  logo: assets/datasight-icon.svg
  favicon: assets/datasight-icon.svg
  palette:
    - scheme: default
      primary: custom
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - End user:
      - How-to guides:
          - Install datasight: end-user/how-to/install.md
          - Explore files without a project: end-user/how-to/explore-files.md
          - Ask questions in the web UI: end-user/how-to/ask-in-web-ui.md
          - Ask questions from the CLI: end-user/how-to/ask-from-cli.md
          - Create visualizations: end-user/how-to/create-visualizations.md
          - Build a dashboard: end-user/how-to/build-a-dashboard.md
          - Save a dashboard as a template: end-user/how-to/save-dashboard-template.md
          - Save and rerun results: end-user/how-to/save-and-rerun.md
          - Audit data quality: end-user/how-to/audit-data-quality.md
          - Configure semantic measures: end-user/how-to/configure-measures.md
          - Declare time series: end-user/how-to/declare-time-series.md
          - Review the SQL query log: end-user/how-to/review-query-log.md
          - Run on an HPC compute node: end-user/how-to/run-on-hpc.md
          - Connect to a remote Flight SQL backend: end-user/how-to/connect-flight-sql.md
      - Tutorials:
          - Explore US electricity generation (EIA): end-user/tutorials/getting-started.md
          - Explore EV charging demand (TEMPO): end-user/tutorials/tempo.md
          - Time validation demo: end-user/tutorials/time-validation.md
      - Reference:
          - Web UI: end-user/reference/web-ui.md
          - Keyboard shortcuts: end-user/reference/keyboard-shortcuts.md
          - Query confidence toggles: end-user/reference/query-confidence-toggles.md
      - Explanation:
          - Why clarifying questions appear: end-user/explanation/query-confidence.md
          - Trusting AI-generated results: end-user/explanation/trusting-ai-results.md
          - What semantic measures are: end-user/explanation/semantic-measures.md
  - Project developer:
      - Set up a project: project-developer/set-up-project.md
      - Database connections: project-developer/database-connections.md
      - Query CSV and Parquet files: project-developer/querying-files.md
      - Write a schema description: project-developer/schema-description.md
      - Create example queries: project-developer/example-queries.md
      - Verify queries across models: project-developer/verification.md
  - Tool developer:
      - Architecture: tool-developer/architecture.md
      - Contributing: tool-developer/contributing.md
  - Reference:
      - Configuration: reference/configuration.md
      - CLI: reference/cli.md
  - Concepts:
      - Users and roles: concepts/users-and-roles.md
      - Choosing an LLM: concepts/choosing-an-llm.md
      - How the agent works: concepts/how-the-agent-works.md
      - SQL result cache: concepts/sql-result-cache.md
