site_name: datasight
site_description: AI-powered data exploration with natural language
repo_url: https://github.com/dsgrid/datasight
repo_name: datasight

theme:
  name: material
  logo: assets/datasight-icon.svg
  favicon: assets/datasight-icon.svg
  palette:
    - scheme: default
      primary: custom
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Use:
      - Tutorials:
          - Explore US electricity generation (EIA): use/tutorials/getting-started.md
          - Explore EV charging demand (TEMPO): use/tutorials/tempo.md
      - How-to guides:
          - Install datasight: use/how-to/install.md
          - Explore files without a project: use/how-to/explore-files.md
          - Ask questions in the web UI: use/how-to/ask-in-web-ui.md
          - Ask questions from the CLI: use/how-to/ask-from-cli.md
          - Create visualizations: use/how-to/create-visualizations.md
          - Build a dashboard: use/how-to/build-a-dashboard.md
          - Save a dashboard as a template: use/how-to/save-dashboard-template.md
          - Save and rerun results: use/how-to/save-and-rerun.md
          - Audit data quality: use/how-to/audit-data-quality.md
          - Review the SQL query log: use/how-to/review-query-log.md
          - Run on an HPC compute node: use/how-to/run-on-hpc.md
          - Connect to a remote Flight SQL backend: use/how-to/connect-flight-sql.md
          - Connect to an Apache Spark backend: use/how-to/connect-spark.md
      - Concepts:
          - Choosing an LLM: use/concepts/choosing-an-llm.md
          - Why clarifying questions appear: use/concepts/query-confidence.md
          - Trusting AI-generated results: use/concepts/trusting-ai-results.md
  - Project Setup:
      - Tutorials:
          - Set up your first project: project-setup/tutorials/set-up-project.md
          - Time validation demo: project-setup/tutorials/time-validation.md
      - How-to guides:
          - Database connections: project-setup/how-to/database-connections.md
          - Query files directly: project-setup/how-to/querying-files.md
          - Write a schema description: project-setup/how-to/schema-description.md
          - Limit schema sent to the LLM: project-setup/how-to/schema-config.md
          - Create example queries: project-setup/how-to/example-queries.md
          - Configure semantic measures: project-setup/how-to/configure-measures.md
          - Declare time series: project-setup/how-to/declare-time-series.md
          - Declare table joins: project-setup/how-to/declare-joins.md
          - Define validation rules: project-setup/how-to/validation-rules.md
          - Verify queries across models: project-setup/how-to/verification.md
      - Concepts:
          - What semantic measures are: project-setup/concepts/semantic-measures.md
  - Reference:
      - CLI: reference/cli.md
      - Configuration: reference/configuration.md
      - Web UI: reference/web-ui.md
      - Keyboard shortcuts: reference/keyboard-shortcuts.md
      - Query confidence toggles: reference/query-confidence-toggles.md
  - Design:
      - Architecture: design/architecture.md
      - How the agent works: design/how-the-agent-works.md
      - SQL result cache: design/sql-result-cache.md
      - Contributing: design/contributing.md
