site_name: datasight
site_description: AI-powered data exploration with natural language
repo_url: https://github.com/dsgrid/datasight
repo_name: datasight

theme:
  name: material
  logo: assets/datasight-icon.svg
  favicon: assets/datasight-icon.svg
  palette:
    - scheme: default
      primary: custom
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - End user:
      - Getting started: end-user/getting-started.md
      - Explore files:
          - Inspect files: end-user/inspect-files.md
          - Audit data quality: end-user/data-quality.md
      - Curated projects:
          - Set up a project: end-user/project-setup.md
          - Use the web UI: end-user/web-ui.md
          - Ask questions (CLI): end-user/ask-questions.md
          - Create visualizations: end-user/visualizations.md
          - Semantic measures: end-user/measures.md
          - Time series: end-user/time-series.md
      - Try the demo: end-user/demo-dataset.md
      - Query confidence: end-user/query-confidence.md
      - SQL query log: end-user/query-log.md
      - Connect to HPC: end-user/remote-hpc.md
  - Project developer:
      - Database connections: project-developer/database-connections.md
      - Query CSV and Parquet files: project-developer/querying-files.md
      - Write a schema description: project-developer/schema-description.md
      - Create example queries: project-developer/example-queries.md
      - Verify queries across models: project-developer/verification.md
  - Tool developer:
      - Architecture: tool-developer/architecture.md
      - Contributing: tool-developer/contributing.md
  - Reference:
      - Configuration: reference/configuration.md
      - CLI: reference/cli.md
  - Concepts:
      - Users and roles: concepts/users-and-roles.md
