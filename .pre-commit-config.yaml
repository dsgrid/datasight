repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/eslint/eslint
    rev: v9.24.0
    hooks:
      - id: eslint
        files: ^src/datasight/web/static/.*\.js$

  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: ty check --exclude src/datasight/llm.py
        language: system
        types: [python]
        pass_filenames: false
