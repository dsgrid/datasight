repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: ty check
        language: system
        types: [python]
        pass_filenames: false
      - id: docs-cli-reference
        name: docs CLI reference drift check
        entry: uv run pytest tests/test_docs_cli_reference.py
        language: system
        files: ^(src/datasight/cli\.py|scripts/generate_cli_reference\.py|docs/reference/cli\.md)$
        pass_filenames: false
