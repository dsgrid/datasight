name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          # Cache disabled: the post-job prune step hits the GitHub Actions
          # cache service and fails the whole job when that service is
          # unhealthy. Install is fast enough without the cache that
          # reliability wins over the ~30s speedup.
          enable-cache: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python project
        run: uv sync --extra dev --frozen

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Check Ruff formatting
        run: uv run ruff format --check .

      - name: Run ty
        run: uv run ty check

      - name: Check frontend types
        run: npm run check
        working-directory: frontend

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          # Cache disabled: the post-job prune step hits the GitHub Actions
          # cache service and fails the whole job when that service is
          # unhealthy. Install is fast enough without the cache that
          # reliability wins over the ~30s speedup.
          enable-cache: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python project
        run: |
          mkdir -p src/datasight/web/static/assets
          uv sync --extra dev --frozen

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend and copy to FastAPI dirs
        run: bash scripts/build-frontend.sh

      - name: Run frontend unit tests
        run: npm test
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright E2E tests
        run: |
          uv run datasight run &
          for i in $(seq 1 30); do curl -s http://localhost:8084 > /dev/null && break; sleep 1; done
          npm run test:e2e
        working-directory: frontend

      - name: Run Python tests
        run: uv run pytest -q -m "not integration" --cov=datasight --cov-report=xml:coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4.2.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          name: datasight-tests
          fail_ci_if_error: false
          verbose: true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Export Python dependencies
        run: uv export --frozen --no-dev --no-emit-project --format requirements-txt -o requirements.txt

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high
        working-directory: frontend
